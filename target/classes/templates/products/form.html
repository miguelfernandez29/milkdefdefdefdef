<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/header :: head(${pageTitle})"></head>
<body>
<nav th:replace="layout/header :: navbar"></nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h2 th:text="${pageTitle}">Product Form</h2>
        </div>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form th:action="@{/products/save}" th:object="${product}" method="post">
                        <input type="hidden" name="mode" th:value="${mode}">

                        <div class="mb-3">
                            <label for="id" class="form-label">ID *</label>
                            <input type="number" class="form-control" id="id" th:field="*{id}"
                                   th:readonly="${mode == 'editing'}" required>
                            <div th:if="${#fields.hasErrors('id')}" class="text-danger" th:errors="*{id}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="name" class="form-label">Name *</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" required>
                            <div th:if="${#fields.hasErrors('name')}" class="text-danger" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description *</label>
                            <textarea class="form-control" id="description" th:field="*{description}" rows="3" required></textarea>
                            <div th:if="${#fields.hasErrors('description')}" class="text-danger" th:errors="*{description}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="price" class="form-label">Price *</label>
                            <input type="number" step="0.01" class="form-control" id="price" th:field="*{price}" required>
                            <div th:if="${#fields.hasErrors('price')}" class="text-danger" th:errors="*{price}"></div>
                        </div>

                        <div class="mb-3">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="layout/footer :: footer"></footer>
<script th:replace="layout/footer :: scripts"></script>
</body>
</html>
