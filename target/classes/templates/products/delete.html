<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/header :: head('Delete Product')"></head>
<body>
<nav th:replace="layout/header :: navbar"></nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h2>Delete Product</h2>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <div class="alert alert-warning">
                        <strong>Warning!</strong> Are you sure you want to delete this product?
                    </div>

                    <table class="table">
                        <tr>
                            <th>ID:</th>
                            <td th:text="${product.id}"></td>
                        </tr>
                        <tr>
                            <th>Name:</th>
                            <td th:text="${product.name}"></td>
                        </tr>
                        <tr>
                            <th>Description:</th>
                            <td th:text="${product.description}"></td>
                        </tr>
                        <tr>
                            <th>Price:</th>
                            <td th:text="${#numbers.formatDecimal(product.price, 1, 2)}"></td>
                        </tr>
                    </table>

                    <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post">
                        <button type="submit" class="btn btn-danger">Confirm Delete</button>
                        <a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="layout/footer :: footer"></footer>
<script th:replace="layout/footer :: scripts"></script>
</body>
</html>
