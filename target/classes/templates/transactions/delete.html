<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/header :: head('Delete Transaction')"></head>
<body>
<nav th:replace="layout/header :: navbar"></nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h2>Delete Transaction</h2>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <div class="alert alert-warning">
                        <strong>Warning!</strong> Are you sure you want to delete this transaction?
                    </div>

                    <table class="table">
                        <tr>
                            <th>ID:</th>
                            <td th:text="${transaction.id}"></td>
                        </tr>
                        <tr>
                            <th>Customer:</th>
                            <td th:text="${transaction.custName != null ? transaction.custName : transaction.custId}"></td>
                        </tr>
                        <tr>
                            <th>Product:</th>
                            <td th:text="${transaction.prodName != null ? transaction.prodName : transaction.prodId}"></td>
                        </tr>
                        <tr>
                            <th>Quantity:</th>
                            <td th:text="${transaction.quantity}"></td>
                        </tr>
                        <tr>
                            <th>Price:</th>
                            <td th:text="${#numbers.formatDecimal(transaction.price, 1, 2)}"></td>
                        </tr>
                        <tr>
                            <th>Date:</th>
                            <td th:text="${transaction.TDate}"></td>
                        </tr>
                    </table>

                    <form th:action="@{/transactions/delete/{id}(id=${transaction.id})}" method="post">
                        <button type="submit" class="btn btn-danger">Confirm Delete</button>
                        <a th:href="@{/transactions}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="layout/footer :: footer"></footer>
<script th:replace="layout/footer :: scripts"></script>
</body>
</html>
