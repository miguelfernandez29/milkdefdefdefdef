<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/header :: head('Transaction Management')"></head>
<body>
<nav th:replace="layout/header :: navbar"></nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h2>Transaction Management</h2>
            <p class="text-muted">Manage sales transactions</p>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row mb-3">
        <div class="col-12">
            <a th:href="@{/transactions/add}" class="btn btn-success">Add New Transaction</a>
            <a th:href="@{/}" class="btn btn-secondary">Exit</a>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Transaction List</h5>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(transactions)}" class="alert alert-info">
                        No transactions found. Click "Add New Transaction" to create one.
                    </div>
                    <table th:unless="${#lists.isEmpty(transactions)}" class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Customer</th>
                            <th>Product</th>
                            <th>Quantity</th>
                            <th>Price</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="transaction : ${transactions}">
                            <td th:text="${transaction.id}"></td>
                            <td th:text="${transaction.custName != null ? transaction.custName : transaction.custId}"></td>
                            <td th:text="${transaction.prodName != null ? transaction.prodName : transaction.prodId}"></td>
                            <td th:text="${transaction.quantity}"></td>
                            <td th:text="${#numbers.formatDecimal(transaction.price, 1, 2)}"></td>
                            <td th:text="${transaction.TDate}"></td>
                            <td>
                                <a th:href="@{/transactions/edit/{id}(id=${transaction.id})}" class="btn btn-sm btn-primary btn-action">Edit</a>
                                <a th:href="@{/transactions/delete/{id}(id=${transaction.id})}" class="btn btn-sm btn-danger btn-action">Delete</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="layout/footer :: footer"></footer>
<script th:replace="layout/footer :: scripts"></script>
</body>
</html>
