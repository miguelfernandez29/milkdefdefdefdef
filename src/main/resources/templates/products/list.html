<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/header :: head('Product Management')"></head>
<body>
<nav th:replace="layout/header :: navbar"></nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h2>Product Management</h2>
            <p class="text-muted">Manage product records</p>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row mb-3">
        <div class="col-12">
            <a th:href="@{/products/add}" class="btn btn-success">Add New Product</a>
            <a th:href="@{/}" class="btn btn-secondary">Exit</a>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Product List</h5>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(products)}" class="alert alert-info">
                        No products found. Click "Add New Product" to create one.
                    </div>
                    <table th:unless="${#lists.isEmpty(products)}" class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.id}"></td>
                            <td th:text="${product.name}"></td>
                            <td th:text="${product.description}"></td>
                            <td th:text="${#numbers.formatDecimal(product.price, 1, 2)}"></td>
                            <td>
                                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-primary btn-action">Edit</a>
                                <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-sm btn-danger btn-action">Delete</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="layout/footer :: footer"></footer>
<script th:replace="layout/footer :: scripts"></script>
</body>
</html>
