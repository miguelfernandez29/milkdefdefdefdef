<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/header :: head('Customer Management')"></head>
<body>
<nav th:replace="layout/header :: navbar"></nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h2>Customer Management</h2>
            <p class="text-muted">Manage customer records</p>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row mb-3">
        <div class="col-12">
            <a th:href="@{/customers/add}" class="btn btn-success">Add New Customer</a>
            <a th:href="@{/}" class="btn btn-secondary">Exit</a>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Customer List</h5>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(customers)}" class="alert alert-info">
                        No customers found. Click "Add New Customer" to create one.
                    </div>
                    <table th:unless="${#lists.isEmpty(customers)}" class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Address Line 1</th>
                            <th>Address Line 2</th>
                            <th>Pincode</th>
                            <th>Phone</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="customer : ${customers}">
                            <td th:text="${customer.id}"></td>
                            <td th:text="${customer.name}"></td>
                            <td th:text="${customer.add1}"></td>
                            <td th:text="${customer.add2}"></td>
                            <td th:text="${customer.pincode}"></td>
                            <td th:text="${customer.phone}"></td>
                            <td>
                                <a th:href="@{/customers/edit/{id}(id=${customer.id})}" class="btn btn-sm btn-primary btn-action">Edit</a>
                                <a th:href="@{/customers/delete/{id}(id=${customer.id})}" class="btn btn-sm btn-danger btn-action">Delete</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="layout/footer :: footer"></footer>
<script th:replace="layout/footer :: scripts"></script>
</body>
</html>
